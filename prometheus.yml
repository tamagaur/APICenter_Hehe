# =============================================================================
# prometheus.yml — Prometheus scrape configuration
# =============================================================================
# Scrapes all 3 API Center instances and Prometheus itself.
# The scrape interval is 15 seconds, which is suitable for development.
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ---- Prometheus self-monitoring ----
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ---- API Center gateway instances ----
  - job_name: 'api-center'
    metrics_path: '/metrics'
    scrape_interval: 10s
    static_configs:
      - targets:
          - 'api-center-1:3000'
          - 'api-center-2:3000'
          - 'api-center-3:3000'
        labels:
          service: 'api-center'
