# =============================================================================
# nginx.conf — NGINX Load Balancer for API Center (HA mode)
# =============================================================================
# Distributes traffic across 3 stateless API Center instances using
# round-robin load balancing. No session stickiness required because
# the gateway is fully stateless — auth is JWT-based and the service
# registry is backed by Redis.
# =============================================================================

events {
    worker_connections 1024;
}

http {
    # ---- Upstream: 3 API Center instances ----
    upstream api_center {
        # Round-robin (default) — no sticky sessions needed
        server api-center-1:3000;
        server api-center-2:3000;
        server api-center-3:3000;
    }

    # ---- Rate limiting zone (connection-level) ----
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;

    server {
        listen 80;
        server_name _;

        # ---- Health check endpoint for the LB itself ----
        location /nginx-health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # ---- Proxy all traffic to the API Center upstream ----
        location / {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://api_center;
            proxy_http_version 1.1;

            # ---- Forward original client info ----
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # ---- WebSocket support (if needed later) ----
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection 'upgrade';

            # ---- Timeouts ----
            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            # ---- Buffering ----
            proxy_buffering off;
        }
    }
}
