# =============================================================================
# GitHub Actions — Deploy Pipeline (triggered on release)
# =============================================================================
# This workflow runs when a new release tag (v*.*.*) is pushed.
# It builds and pushes the Docker image to a container registry.
#
# CUSTOMIZE: Replace the registry URL and image name with your own.
#
# SECRETS NEEDED (set in GitHub repo → Settings → Secrets):
#  - DOCKER_USERNAME    — Your Docker Hub or registry username
#  - DOCKER_PASSWORD    — Your Docker Hub or registry password/token
# =============================================================================

name: Deploy

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: docker.io
  IMAGE_NAME: your-org/api-center

jobs:
  deploy:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
