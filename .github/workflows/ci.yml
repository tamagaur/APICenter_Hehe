# =============================================================================
# GitHub Actions CI/CD Pipeline — API Center
# =============================================================================
# This workflow runs on every push and pull request to main.
#
# WHAT IT DOES:
#  1. Lint    — Checks code style and catches common issues
#  2. Build   — Compiles TypeScript to verify no type errors
#  3. Test    — Runs the full test suite
#  4. Docker  — Builds the Docker image to verify it works
#
# WHY CI/CD:
#  - Catches bugs BEFORE they reach production
#  - Every PR is automatically validated
#  - No manual "did you run the tests?" — the pipeline enforces it
#  - The team can trust that main branch always compiles and passes tests
#
# SECRETS NEEDED (set in GitHub repo → Settings → Secrets):
#  - None for basic CI. For deployment, add DOCKER_USERNAME, DOCKER_PASSWORD, etc.
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint & Type Check
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit

  # ---------------------------------------------------------------------------
  # Job 2: Build
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 3: Test
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test

  # ---------------------------------------------------------------------------
  # Job 4: Docker Build (verify Dockerfile works)
  # ---------------------------------------------------------------------------
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t api-center:${{ github.sha }} .

      - name: Verify image runs
        run: |
          docker run --rm -d --name api-center-test \
            -e PORT=3000 \
            -e NODE_ENV=test \
            -e KAFKA_BROKERS=localhost:9092 \
            -p 3000:3000 \
            api-center:${{ github.sha }} || true
          sleep 3
          docker stop api-center-test || true
