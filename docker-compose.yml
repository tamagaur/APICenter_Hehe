# =============================================================================
# Docker Compose — API Center Infrastructure (Dynamic Service Registry)
# =============================================================================
# Spins up 3 API Center instances behind an NGINX load balancer, alongside
# Kafka (event streaming), Redis (registry cache + rate limiting),
# Prometheus + Grafana (metrics), Jaeger (tracing), and Kafka UI (monitoring).
#
# Run with: docker-compose up -d
#
# Kafka runs in KRaft mode (no Zookeeper needed).
# Redis is used as a shared cache for the Dynamic Service Registry.
# =============================================================================

version: '3.8'

# ---------------------------------------------------------------------------
# Shared env/healthcheck anchors for the 3 API Center instances
# ---------------------------------------------------------------------------
x-api-center-common: &api-center-common
  build: .
  env_file:
    - .env
  depends_on:
    kafka:
      condition: service_healthy
    redis-cache:
      condition: service_healthy
    redis-rate-limit:
      condition: service_healthy
  healthcheck:
    test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/v1/health/live"]
    interval: 15s
    timeout: 5s
    retries: 3
    start_period: 30s
  restart: unless-stopped
  networks:
    - api-center-network

services:
  # ---------------------------------------------------------------------------
  # NGINX — Load balancer distributing traffic across 3 gateway instances
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api-center-1:
        condition: service_healthy
      api-center-2:
        condition: service_healthy
      api-center-3:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/nginx-health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - api-center-network

  # ---------------------------------------------------------------------------
  # API Center — 3 stateless gateway instances (no session stickiness needed)
  # ---------------------------------------------------------------------------
  api-center-1:
    <<: *api-center-common
    container_name: api-center-1

  api-center-2:
    <<: *api-center-common
    container_name: api-center-2

  api-center-3:
    <<: *api-center-common
    container_name: api-center-3

  # ---------------------------------------------------------------------------
  # Kafka (KRaft mode) — Event streaming platform for inter-tribe communication
  # ---------------------------------------------------------------------------
  # KRaft = Kafka Raft. Kafka manages its own metadata internally using the
  # Raft consensus protocol, eliminating the need for a separate Zookeeper
  # container. This is the standard since Kafka 3.3+ and Zookeeper is
  # deprecated as of Kafka 4.0.
  # ---------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    ports:
      - "9092:9092"
    environment:
      # ---- KRaft Configuration ----
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # ---- Listeners ----
      # PLAINTEXT  = internal Docker network (other containers use kafka:29092)
      # HOST       = host machine access (localhost:9092)
      # CONTROLLER = KRaft internal controller communication
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # ---- Broker Settings ----
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - api-center-network

  # ---------------------------------------------------------------------------
  # Redis (Rate Limiting) — Dedicated Redis for ThrottlerGuard / rate limiting
  # ---------------------------------------------------------------------------
  redis-rate-limit:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    command: redis-server --loglevel warning --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - api-center-network

  # ---------------------------------------------------------------------------
  # Redis (Cache) — Registry persistence, token caching
  # ---------------------------------------------------------------------------
  # Redis stores the Dynamic Service Registry so that services survive
  # gateway restarts without re-registering. Also used for token caching.
  # ---------------------------------------------------------------------------
  redis-cache:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - redis-cache-data:/data
    networks:
      - api-center-network

  # ---------------------------------------------------------------------------
  # Kafka UI — Web interface to monitor Kafka topics and messages
  # ---------------------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: api-center-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka
    networks:
      - api-center-network

  # ---------------------------------------------------------------------------
  # Prometheus — Metrics collection & alerting
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      nginx:
        condition: service_healthy
    networks:
      - api-center-network

  # ---------------------------------------------------------------------------
  # Grafana — Metrics visualization dashboards
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - api-center-network

  # ---------------------------------------------------------------------------
  # Jaeger — Distributed tracing UI & collector
  # ---------------------------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:1.55
    ports:
      - "16686:16686"    # Jaeger UI
      - "14268:14268"    # HTTP collector (traces ingestion)
      - "4318:4318"      # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - api-center-network

networks:
  api-center-network:
    driver: bridge

volumes:
  redis-cache-data:
  prometheus-data:
  grafana-data:
    driver: local
